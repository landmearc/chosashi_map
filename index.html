    }).addTo(map);

    // 生成したすべての円オブジェクトを管理する配列
    let circleLayers = [];
    // 初期半径：10km (10000メートル)
    let currentRadius = 10000; 

    // 円を描画する関数
    function drawCircles(radiusInMeters) {
        // すでに描画されている円があれば削除
        circleLayers.forEach(layer => map.removeLayer(layer));
        circleLayers = [];

        // 新しい半径で一斉に円を描画
        locations.forEach(loc => {
            const lat = loc[0];
            const lon = loc[1];
            const address = loc[2];

            const circle = L.circle([lat, lon], {
                radius: radiusInMeters,
                color: '#1e88e5',       // 枠線の色
                fillColor: '#1e88e5',   // 塗りつぶしの色
                fillOpacity: 0.25,      // 透過度 (画像に寄せて少し薄めに)
                weight: 1               // 線の太さ
            }).addTo(map).bindPopup(`住所: ${address}`);

            circleLayers.push(circle);
        });
    }

    // 初回描画 (初期値10km)
    drawCircles(currentRadius);

    // 右下の半径切り替えカスタムコントロールの作成
    const RadiusControl = L.Control.extend({
        options: { position: 'bottomright' },
        onAdd: function() {
            const container = L.DomUtil.create('div', 'radius-control-pane');
            
            // 切り替える半径のリスト（表示名とメーター数）
            const radii = [
                { label: '1km', value: 1000 },
                { label: '3km', value: 3000 },
                { label: '5km', value: 5000 },
                { label: '10km', value: 10000 },
                { label: '20km', value: 20000 },
                { label: '30km', value: 30000 },
                { label: '50km', value: 50000 }
            ];

            radii.forEach(r => {
                const btn = L.DomUtil.create('button', 'radius-btn', container);
                btn.innerText = r.label;
                
                // 初期のアクティブクラス割り当て
                if (r.value === currentRadius) btn.classList.add('active');

                // クリックイベント
                L.DomEvent.on(btn, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    
                    // アクティブなボタンのクラスを付け替え
                    const activeBtn = container.querySelector('.radius-btn.active');
                    if (activeBtn) activeBtn.classList.remove('active');
                    btn.classList.add('active');

                    // 円を再描画
                    currentRadius = r.value;
                    drawCircles(currentRadius);
                });
            });

            return container;
        }
    });

    // コントロールを地図に追加
    map.addControl(new RadiusControl());
